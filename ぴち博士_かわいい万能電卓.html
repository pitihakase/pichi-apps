<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>ぴち博士のかわいい万能電卓</title>
<style>
:root{--bg1:#fff4fb;--bg2:#eef7ff;--card:rgba(255,255,255,.82);--ink:#3b3651;--muted:#7d7694;--pink:#ff8fbd;--pink2:#ffd1e5;--lav:#b7a7ff;--blue:#8fd8ff;--mint:#a9efd5;--shadow:0 24px 70px rgba(92,77,139,.18)}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:"Yu Gothic UI","Hiragino Sans",system-ui,sans-serif;color:var(--ink)}
body{min-height:100vh;display:grid;place-items:center;padding:18px;background:radial-gradient(circle at 12% 16%,rgba(255,143,189,.28),transparent 26%),radial-gradient(circle at 88% 18%,rgba(143,216,255,.30),transparent 28%),radial-gradient(circle at 52% 92%,rgba(183,167,255,.25),transparent 30%),linear-gradient(145deg,var(--bg1),var(--bg2));overflow-x:hidden}
body::before,body::after{content:"✦";position:fixed;font-size:44px;color:rgba(255,143,189,.35);animation:float 5s ease-in-out infinite;pointer-events:none}body::before{left:4vw;top:9vh}body::after{right:5vw;bottom:8vh;color:rgba(143,216,255,.45);animation-delay:-2.5s}@keyframes float{50%{transform:translateY(-10px) rotate(12deg)}}
.app{width:min(980px,100%);display:grid;grid-template-columns:minmax(0,1fr) 290px;gap:16px}.calculator,.side{background:var(--card);border:1px solid rgba(255,255,255,.9);backdrop-filter:blur(18px);box-shadow:var(--shadow);border-radius:30px}.calculator{padding:18px}.side{padding:18px;display:flex;flex-direction:column;min-height:650px}.titlebar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}.brand{display:flex;align-items:center;gap:10px;font-weight:900;letter-spacing:.03em}.mascot{font-size:34px;filter:drop-shadow(0 6px 8px rgba(255,143,189,.25))}.badge{font-size:12px;background:linear-gradient(135deg,var(--pink2),#fff);padding:7px 10px;border-radius:999px;color:#7b4861;font-weight:800}.modebar{display:flex;gap:8px;flex-wrap:wrap}.chip{border:0;border-radius:999px;padding:8px 12px;font-weight:800;color:var(--ink);background:#fff;box-shadow:0 6px 14px rgba(92,77,139,.10);cursor:pointer}.chip.active{background:linear-gradient(135deg,var(--lav),var(--blue));color:#fff}
.screen{background:linear-gradient(145deg,#fff,#f9f7ff);border:1px solid #fff;border-radius:24px;padding:16px;box-shadow:inset 0 2px 0 #fff,0 12px 26px rgba(92,77,139,.11);margin-bottom:14px}#expression{width:100%;border:0;outline:0;background:transparent;color:var(--muted);font-size:20px;text-align:right;min-height:38px;font-family:ui-monospace,SFMono-Regular,Consolas,monospace}#result{min-height:56px;display:flex;justify-content:flex-end;align-items:center;text-align:right;font-size:38px;font-weight:900;word-break:break-all}.screen-tools{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:8px}.status{font-size:12px;color:var(--muted)}.copy{border:0;background:var(--pink2);color:#7b4861;border-radius:12px;padding:7px 10px;font-weight:800;cursor:pointer}
.keys{display:grid;grid-template-columns:repeat(6,1fr);gap:9px}.key{border:0;min-height:54px;border-radius:18px;background:#fff;color:var(--ink);font-size:17px;font-weight:900;cursor:pointer;box-shadow:0 8px 18px rgba(92,77,139,.10),inset 0 1px 0 #fff;transition:.12s transform,.12s filter;user-select:none}.key:hover{filter:brightness(1.02)}.key:active{transform:translateY(2px) scale(.98)}.key.fn{background:linear-gradient(145deg,#f0ebff,#eaf7ff);color:#6658a6;font-size:14px}.key.op{background:linear-gradient(145deg,var(--pink2),#fff0f6);color:#a24f75}.key.mem{background:linear-gradient(145deg,#e6fff6,#f8fffc);color:#357e68;font-size:14px}.key.warn{background:linear-gradient(145deg,#ffe7eb,#fff);color:#b65464}.key.equal{background:linear-gradient(135deg,var(--pink),var(--lav));color:#fff;font-size:24px}.key.zero{grid-column:span 2}.side h2{font-size:18px;margin:0 0 10px}.history{flex:1;overflow:auto;display:flex;flex-direction:column;gap:9px;padding-right:3px}.history-item{border:0;text-align:right;background:rgba(255,255,255,.82);border-radius:16px;padding:11px;cursor:pointer;box-shadow:0 6px 14px rgba(92,77,139,.08)}.history-item small{display:block;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.history-item strong{display:block;margin-top:3px;font-size:17px;word-break:break-all}.empty{color:var(--muted);text-align:center;padding:30px 8px;line-height:1.8}.side-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.side-actions button{border:0;border-radius:14px;padding:10px;font-weight:800;cursor:pointer;background:#fff;color:var(--ink)}.tips{margin-top:12px;background:linear-gradient(145deg,#fff8d9,#fff);border-radius:16px;padding:11px;font-size:12px;color:#74632d;line-height:1.7}.toast{position:fixed;left:50%;bottom:24px;transform:translate(-50%,20px);opacity:0;background:#3b3651;color:#fff;padding:10px 16px;border-radius:999px;font-weight:800;transition:.2s;pointer-events:none;z-index:10}.toast.show{transform:translate(-50%,0);opacity:1}
@media(max-width:820px){.app{grid-template-columns:1fr}.side{min-height:260px}.keys{grid-template-columns:repeat(5,1fr)}.key.zero{grid-column:span 1}.calculator{padding:14px}.side{padding:14px}}@media(max-width:520px){body{padding:8px}.calculator,.side{border-radius:22px}.keys{gap:7px}.key{min-height:50px;border-radius:15px;font-size:15px}.key.fn,.key.mem{font-size:12px}#result{font-size:31px}.brand span:last-child{font-size:14px}}
</style>
</head>
<body>
<main class="app">
<section class="calculator" aria-label="万能電卓">
<div class="titlebar"><div class="brand"><span class="mascot">🧮</span><span>ぴち博士の万能電卓</span></div><span class="badge">単一HTML・オフライン</span></div>
<div class="modebar"><button class="chip active" id="degBtn" type="button">DEG</button><button class="chip" id="radBtn" type="button">RAD</button><button class="chip" id="formatBtn" type="button">通常表示</button></div>
<div class="screen"><input id="expression" autocomplete="off" spellcheck="false" inputmode="text" aria-label="計算式" placeholder="例：sqrt(144)+sin(30)"><div id="result" aria-live="polite">0</div><div class="screen-tools"><span class="status" id="status">準備OK ✨</span><button class="copy" id="copyBtn" type="button">結果をコピー</button></div></div>
<div class="keys" id="keys">
<button class="key mem" data-action="mc">MC</button><button class="key mem" data-action="mr">MR</button><button class="key mem" data-action="mplus">M+</button><button class="key mem" data-action="mminus">M−</button><button class="key warn" data-action="clear">AC</button><button class="key warn" data-action="back">⌫</button>
<button class="key fn" data-insert="sin(">sin</button><button class="key fn" data-insert="cos(">cos</button><button class="key fn" data-insert="tan(">tan</button><button class="key fn" data-insert="sqrt(">√</button><button class="key fn" data-insert="(">(</button><button class="key fn" data-insert=")">)</button>
<button class="key fn" data-insert="asin(">asin</button><button class="key fn" data-insert="acos(">acos</button><button class="key fn" data-insert="atan(">atan</button><button class="key fn" data-insert="cbrt(">∛</button><button class="key fn" data-insert="pi">π</button><button class="key fn" data-insert="e">e</button>
<button class="key fn" data-insert="ln(">ln</button><button class="key fn" data-insert="log(">log</button><button class="key fn" data-insert="abs(">abs</button><button class="key fn" data-insert="^">xʸ</button><button class="key fn" data-insert="!">x!</button><button class="key fn" data-insert="%">%</button>
<button class="key" data-insert="7">7</button><button class="key" data-insert="8">8</button><button class="key" data-insert="9">9</button><button class="key op" data-insert="/">÷</button><button class="key fn" data-insert="floor(">floor</button><button class="key equal" data-action="equals">＝</button>
<button class="key" data-insert="4">4</button><button class="key" data-insert="5">5</button><button class="key" data-insert="6">6</button><button class="key op" data-insert="*">×</button><button class="key fn" data-insert="ceil(">ceil</button><button class="key equal" data-action="equals">＝</button>
<button class="key" data-insert="1">1</button><button class="key" data-insert="2">2</button><button class="key" data-insert="3">3</button><button class="key op" data-insert="-">−</button><button class="key fn" data-insert="round(">round</button><button class="key equal" data-action="equals">＝</button>
<button class="key zero" data-insert="0">0</button><button class="key" data-insert=".">.</button><button class="key op" data-insert="+">＋</button><button class="key fn" data-insert="ans">ANS</button><button class="key fn" data-insert=",">,</button><button class="key fn" data-insert="max(">max</button>
</div></section>
<aside class="side"><h2>計算履歴 💗</h2><div class="history" id="history"></div><div class="side-actions"><button id="clearHistory" type="button">履歴を消す</button><button id="exportHistory" type="button">履歴を保存</button></div><div class="tips">Enter＝計算　Esc＝クリア　Backspace＝1文字削除<br>関数例：sin(30)、log(100)、min(3,8)</div></aside>
</main><div class="toast" id="toast"></div>
<script>
(()=>{'use strict';
const expr=document.getElementById('expression'),resultEl=document.getElementById('result'),statusEl=document.getElementById('status'),historyEl=document.getElementById('history'),toastEl=document.getElementById('toast'),degBtn=document.getElementById('degBtn'),radBtn=document.getElementById('radBtn'),formatBtn=document.getElementById('formatBtn');
let angleMode='DEG',scientific=false,memory=Number(localStorage.getItem('pichi_calc_memory')||0),ans=Number(localStorage.getItem('pichi_calc_ans')||0),history=JSON.parse(localStorage.getItem('pichi_calc_history')||'[]');
const toast=m=>{toastEl.textContent=m;toastEl.classList.add('show');setTimeout(()=>toastEl.classList.remove('show'),1300)};
const save=()=>{localStorage.setItem('pichi_calc_memory',String(memory));localStorage.setItem('pichi_calc_ans',String(ans));localStorage.setItem('pichi_calc_history',JSON.stringify(history.slice(0,60)))};
function clean(n){if(!Number.isFinite(n))throw new Error('計算結果が大きすぎます');if(Object.is(n,-0))n=0;if(scientific)return n.toExponential(10).replace(/\.0+e/,'e').replace(/(\.\d*?)0+e/,'$1e');const a=Math.abs(n);if((a!==0&&a<1e-10)||a>=1e14)return n.toExponential(10).replace(/\.0+e/,'e').replace(/(\.\d*?)0+e/,'$1e');return String(Number(n.toPrecision(14)))}
class Parser{constructor(text){this.tokens=this.tokenize(text);this.i=0}tokenize(text){const out=[];let i=0;while(i<text.length){const c=text[i];if(/\s/.test(c)){i++;continue}const num=text.slice(i).match(/^(?:\d+\.?\d*|\.\d+)(?:e[+-]?\d+)?/i);if(num){out.push({t:'num',v:Number(num[0])});i+=num[0].length;continue}const id=text.slice(i).match(/^[A-Za-z_][A-Za-z0-9_]*/);if(id){out.push({t:'id',v:id[0].toLowerCase()});i+=id[0].length;continue}if('+-*/^%!(),'.includes(c)){out.push({t:c,v:c});i++;continue}if(c==='×'){out.push({t:'*',v:'*'});i++;continue}if(c==='÷'){out.push({t:'/',v:'/'});i++;continue}if(c==='−'){out.push({t:'-',v:'-'});i++;continue}if(c==='π'){out.push({t:'id',v:'pi'});i++;continue}throw new Error('読めない文字があります: '+c)}out.push({t:'eof',v:''});return out}peek(t){return this.tokens[this.i].t===t}take(t){if(!this.peek(t))throw new Error('「'+t+'」が必要です');return this.tokens[this.i++]}parse(){const v=this.add();if(!this.peek('eof'))throw new Error('式の途中に余分な文字があります');return v}add(){let v=this.mul();while(this.peek('+')||this.peek('-')){const op=this.tokens[this.i++].t,r=this.mul();v=op==='+'?v+r:v-r}return v}starts(){return this.peek('num')||this.peek('id')||this.peek('(')}mul(){let v=this.power();for(;;){if(this.peek('*')||this.peek('/')){const op=this.tokens[this.i++].t,r=this.power();if(op==='/'&&r===0)throw new Error('0では割れません');v=op==='*'?v*r:v/r}else if(this.starts())v*=this.power();else break}return v}power(){let v=this.unary();if(this.peek('^')){this.i++;v=Math.pow(v,this.power())}return v}unary(){if(this.peek('+')){this.i++;return this.unary()}if(this.peek('-')){this.i++;return-this.unary()}return this.postfix()}postfix(){let v=this.primary();while(this.peek('!')||this.peek('%')){if(this.peek('!')){this.i++;v=this.factorial(v)}else{this.i++;v/=100}}return v}primary(){if(this.peek('num'))return this.tokens[this.i++].v;if(this.peek('(')){this.i++;const v=this.add();this.take(')');return v}if(this.peek('id')){const name=this.tokens[this.i++].v;if(this.peek('(')){this.i++;const args=[];if(!this.peek(')')){args.push(this.add());while(this.peek(',')){this.i++;args.push(this.add())}}this.take(')');return this.call(name,args)}if(name==='pi')return Math.PI;if(name==='e')return Math.E;if(name==='ans')return ans;if(name==='mem')return memory;throw new Error('不明な定数です: '+name)}throw new Error('数値または関数が必要です')}factorial(n){if(!Number.isInteger(n)||n<0||n>170)throw new Error('階乗は0〜170の整数だけです');let v=1;for(let i=2;i<=n;i++)v*=i;return v}call(name,a){const rad=x=>angleMode==='DEG'?x*Math.PI/180:x,ang=x=>angleMode==='DEG'?x*180/Math.PI:x,one=()=>{if(a.length!==1)throw new Error(name+'は引数1個です');return a[0]},map={sin:()=>Math.sin(rad(one())),cos:()=>Math.cos(rad(one())),tan:()=>Math.tan(rad(one())),asin:()=>ang(Math.asin(one())),acos:()=>ang(Math.acos(one())),atan:()=>ang(Math.atan(one())),sqrt:()=>Math.sqrt(one()),cbrt:()=>Math.cbrt(one()),abs:()=>Math.abs(one()),ln:()=>Math.log(one()),log:()=>Math.log10(one()),exp:()=>Math.exp(one()),floor:()=>Math.floor(one()),ceil:()=>Math.ceil(one()),round:()=>Math.round(one()),min:()=>Math.min(...a),max:()=>Math.max(...a),pow:()=>{if(a.length!==2)throw new Error('powは引数2個です');return Math.pow(a[0],a[1])}};if(!map[name])throw new Error('不明な関数です: '+name);const v=map[name]();if(Number.isNaN(v))throw new Error('この値では計算できません');return v}}
const evaluate=(text=expr.value)=>{const source=text.trim();return source?new Parser(source).parse():0};function preview(){if(!expr.value.trim()){resultEl.textContent='0';statusEl.textContent='準備OK ✨';return}try{resultEl.textContent=clean(evaluate());statusEl.textContent=angleMode+'・入力中'}catch(e){statusEl.textContent=e.message}}function calculate(){const source=expr.value.trim();if(!source)return;try{const value=evaluate(source),shown=clean(value);ans=value;resultEl.textContent=shown;statusEl.textContent='計算できました 💗';history.unshift({expr:source,result:shown,time:new Date().toLocaleString('ja-JP')});history=history.slice(0,60);save();renderHistory()}catch(e){statusEl.textContent=e.message;toast('式を確認してね')}}function insert(text){const s=expr.selectionStart??expr.value.length,e=expr.selectionEnd??s;expr.value=expr.value.slice(0,s)+text+expr.value.slice(e);const p=s+text.length;expr.focus();expr.setSelectionRange(p,p);preview()}function back(){const s=expr.selectionStart??expr.value.length,e=expr.selectionEnd??s;if(s!==e){expr.value=expr.value.slice(0,s)+expr.value.slice(e);expr.setSelectionRange(s,s)}else if(s>0){expr.value=expr.value.slice(0,s-1)+expr.value.slice(s);expr.setSelectionRange(s-1,s-1)}preview();expr.focus()}function renderHistory(){historyEl.innerHTML='';if(!history.length){historyEl.innerHTML='<div class="empty">まだ履歴はありません。<br>計算するとここに残ります ✨</div>';return}history.forEach(h=>{const b=document.createElement('button');b.className='history-item';b.type='button';b.innerHTML='<small></small><strong></strong>';b.querySelector('small').textContent=h.expr;b.querySelector('strong').textContent='= '+h.result;b.title=h.time;b.onclick=()=>{expr.value=h.expr;preview();expr.focus()};historyEl.appendChild(b)})}function setMode(m){angleMode=m;degBtn.classList.toggle('active',m==='DEG');radBtn.classList.toggle('active',m==='RAD');preview()}
document.getElementById('keys').onclick=e=>{const b=e.target.closest('button');if(!b)return;if(b.dataset.insert!==undefined){insert(b.dataset.insert);return}const a=b.dataset.action;if(a==='equals')calculate();else if(a==='clear'){expr.value='';preview();expr.focus()}else if(a==='back')back();else if(a==='mc'){memory=0;save();toast('メモリーを消しました')}else if(a==='mr')insert(clean(memory));else if(a==='mplus'||a==='mminus'){try{const v=evaluate();memory+=a==='mplus'?v:-v;save();toast('メモリー: '+clean(memory))}catch{toast('先に計算式を入れてね')}}};expr.addEventListener('input',preview);expr.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();calculate()}else if(e.key==='Escape'){e.preventDefault();expr.value='';preview()}});degBtn.onclick=()=>setMode('DEG');radBtn.onclick=()=>setMode('RAD');formatBtn.onclick=()=>{scientific=!scientific;formatBtn.textContent=scientific?'指数表示':'通常表示';formatBtn.classList.toggle('active',scientific);preview()};document.getElementById('copyBtn').onclick=async()=>{try{await navigator.clipboard.writeText(resultEl.textContent);toast('結果をコピーしました')}catch{toast('コピーできませんでした')}};document.getElementById('clearHistory').onclick=()=>{history=[];save();renderHistory();toast('履歴を消しました')};document.getElementById('exportHistory').onclick=()=>{const text=history.map(h=>`${h.time}\n${h.expr} = ${h.result}`).join('\n\n');const blob=new Blob([text||'履歴はありません'],{type:'text/plain;charset=utf-8'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='万能電卓_計算履歴.txt';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)};renderHistory();preview();expr.focus();
})();
</script>
</body>
</html>

<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>ぴち博士 安全指示事項 参考リスト</title>
<style>
:root{--bg1:#fff7fb;--bg2:#eef9ff;--ink:#2e2a3f;--muted:#726b86;--line:rgba(98,82,135,.15);--card:rgba(255,255,255,.86);--pink:#ff8fbd;--purple:#9f91ff;--blue:#65c7ff;--green:#67d5b5;--yellow:#ffe08a;--red:#ff7a7a;--shadow:0 18px 46px rgba(67,55,105,.16)}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:"Yu Gothic UI","Hiragino Sans",system-ui,sans-serif;color:var(--ink)}
body{padding:14px;background:radial-gradient(circle at 10% 5%,rgba(255,143,189,.28),transparent 28%),radial-gradient(circle at 92% 10%,rgba(101,199,255,.25),transparent 30%),linear-gradient(145deg,var(--bg1),var(--bg2));}
button,input,select,textarea{font:inherit}button{cursor:pointer}main{width:min(1180px,100%);margin:0 auto}.hero{position:relative;overflow:hidden;padding:28px 18px 22px;border:1px solid rgba(255,255,255,.9);border-radius:30px;background:rgba(255,255,255,.72);box-shadow:var(--shadow);backdrop-filter:blur(16px)}
.hero:before{content:"";position:absolute;inset:auto -80px -110px auto;width:260px;height:260px;border-radius:50%;background:linear-gradient(135deg,var(--pink),var(--purple));opacity:.18}.badge{display:inline-flex;align-items:center;gap:8px;padding:8px 13px;border-radius:999px;background:#fff;color:#9a4871;font-weight:900;box-shadow:0 8px 20px rgba(255,143,189,.18)}h1{position:relative;margin:14px 0 8px;font-size:clamp(28px,6vw,48px);line-height:1.08}.lead{position:relative;margin:0;color:var(--muted);font-weight:800;line-height:1.7}.notice{position:relative;margin-top:14px;padding:12px 14px;border-radius:18px;background:#fff6da;border:1px solid rgba(193,151,45,.24);color:#73581a;font-weight:800;line-height:1.7}.toolbar{display:grid;grid-template-columns:1.2fr 180px 150px;gap:10px;margin:14px 0}.field,.select{width:100%;padding:13px 14px;border:1px solid var(--line);border-radius:17px;background:rgba(255,255,255,.92);color:var(--ink);box-shadow:0 8px 20px rgba(67,55,105,.06)}.tabs{display:flex;gap:8px;overflow:auto;padding:2px 0 12px}.tab{white-space:nowrap;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.82);padding:10px 13px;color:var(--muted);font-weight:900}.tab.active{background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;border-color:transparent}.layout{display:grid;grid-template-columns:1fr 360px;gap:14px}.cards{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.card{position:relative;overflow:hidden;padding:18px;border-radius:24px;border:1px solid rgba(255,255,255,.9);background:var(--card);box-shadow:0 12px 30px rgba(67,55,105,.11);backdrop-filter:blur(14px)}.card:after{content:"";position:absolute;right:-52px;bottom:-62px;width:140px;height:140px;border-radius:50%;background:var(--accent,var(--pink));opacity:.16}.top{position:relative;display:flex;align-items:flex-start;justify-content:space-between;gap:10px}.cat{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;background:#fff;color:#473d66;font-size:12px;font-weight:900}.risk{font-size:12px;font-weight:900;color:#fff;padding:6px 9px;border-radius:999px;background:var(--accent,var(--pink))}.text{position:relative;margin:13px 0 14px;line-height:1.75;font-weight:800}.meta{position:relative;color:var(--muted);font-size:12px;line-height:1.6}.actions{position:relative;display:flex;gap:8px;margin-top:14px}.btn{border:0;border-radius:14px;padding:11px 12px;font-weight:900;color:#fff;background:linear-gradient(135deg,var(--pink),var(--purple));box-shadow:0 10px 22px rgba(128,105,212,.18)}.btn.sub{color:var(--ink);background:#fff;border:1px solid var(--line);box-shadow:none}.btn.ok{background:linear-gradient(135deg,#3fbea0,#68d2b8)}.side{position:sticky;top:12px;align-self:start;border-radius:28px;border:1px solid rgba(255,255,255,.9);background:rgba(255,255,255,.86);box-shadow:var(--shadow);padding:16px}.side h2{margin:2px 0 10px;font-size:22px}.selected{min-height:130px;display:grid;gap:8px}.sel{padding:10px 12px;border-radius:15px;background:#f7f4ff;border:1px solid rgba(159,145,255,.18);font-size:13px;line-height:1.55}.empty{color:var(--muted);font-weight:800;padding:14px;border:1px dashed var(--line);border-radius:16px;background:#fff}.copybox{width:100%;min-height:150px;margin-top:10px;padding:12px;border-radius:16px;border:1px solid var(--line);background:#fbfbff;line-height:1.6}.sideActions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.custom{display:grid;gap:8px;margin-top:14px;padding-top:14px;border-top:1px solid var(--line)}.count{margin:0 0 10px;color:var(--muted);font-weight:900}.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(20px);opacity:0;padding:12px 16px;border-radius:999px;background:#302d42;color:#fff;font-weight:900;box-shadow:var(--shadow);transition:.2s}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}footer{text-align:center;color:var(--muted);font-size:12px;padding:22px 8px}.danger{--accent:var(--red)}.height{--accent:var(--purple)}.machine{--accent:#4aa8ff}.fire{--accent:#ff9d61}.electric{--accent:#f0bd35}.health{--accent:#46c7aa}.traffic{--accent:#ff8fbd}.quality{--accent:#7cb7ff}.clean{--accent:#73d781}.gas{--accent:#8d9cff}@media(max-width:960px){.layout{grid-template-columns:1fr}.side{position:relative;top:auto}.toolbar{grid-template-columns:1fr}.cards{grid-template-columns:1fr}}@media(max-width:560px){body{padding:10px}.hero{border-radius:24px}.actions,.sideActions{display:grid}.btn{width:100%}.card{padding:16px}}
</style>
</head>
<body>
<main>
<section class="hero"><span class="badge">🦺 ぴち博士 現場ミニアプリ</span><h1>安全指示事項<br>参考リスト</h1><p class="lead">朝礼・KY・作業指示書に使いやすい安全指示事項を、検索・分類・コピーできる可愛い仕様でまとめました。</p><div class="notice">※これは参考リストです。実際の作業では、現場ルール・元請指示・法令・作業手順書・当日のKYを優先してください。</div></section>
<div class="toolbar"><input id="q" class="field" placeholder="キーワード検索：例 足場 クレーン 熱中症 火気" autocomplete="off"><select id="risk" class="select"><option value="">全リスク</option><option>高</option><option>中</option><option>低</option></select><select id="sort" class="select"><option value="default">標準順</option><option value="risk">高リスク順</option><option value="short">短い順</option></select></div>
<div id="tabs" class="tabs"></div><div class="layout"><section><p id="count" class="count"></p><div id="cards" class="cards"></div></section><aside class="side"><h2>📝 コピー用まとめ</h2><div id="selected" class="selected"><div class="empty">カードの「追加」を押すと、ここに安全指示事項がまとまります。</div></div><textarea id="copybox" class="copybox" placeholder="ここにコピー用文章が出ます"></textarea><div class="sideActions"><button class="btn ok" id="copyAll">まとめてコピー</button><button class="btn sub" id="clearAll">クリア</button></div><div class="custom"><strong>✍️ 追加入力</strong><textarea id="customText" class="copybox" style="min-height:84px" placeholder="今日の現場だけの注意事項を入力"></textarea><button class="btn" id="addCustom">追加入力を追加</button></div></aside></div><footer>ぴち博士研究室 / φ = φ-1 ≡ φ ≣ φ+1</footer></main><div id="toast" class="toast">コピーしました</div>
<script>
const ITEMS=[{c:'基本',icon:'✅',r:'高',t:'作業前に作業内容・危険ポイント・退避場所を全員で確認し、指差呼称を行う。',m:'朝礼・KY・作業前確認',cls:'danger'},{c:'基本',icon:'✅',r:'中',t:'保護具はヘルメット、安全靴、手袋、保護メガネを作業内容に合わせて正しく着用する。',m:'保護具・PPE',cls:'quality'},{c:'基本',icon:'✅',r:'中',t:'作業場所の整理整頓を行い、通路・避難経路・消火器前に物を置かない。',m:'5S・通路確保',cls:'clean'},{c:'墜落転落',icon:'🪜',r:'高',t:'高所作業では親綱・安全帯フックを先掛けし、移動時も無胴綱状態を作らない。',m:'高所・足場・手摺',cls:'height'},{c:'墜落転落',icon:'🪜',r:'高',t:'開口部・端部・床抜け箇所は、手摺・養生・表示を確認してから作業する。',m:'開口部・床端部',cls:'height'},{c:'墜落転落',icon:'🪜',r:'中',t:'脚立は天板に乗らず、開き止めを確実に掛け、無理な横移動をしない。',m:'脚立・立馬',cls:'height'},{c:'足場',icon:'🏗️',r:'高',t:'足場使用前に床材・手摺・幅木・昇降設備・最大積載荷重の表示を確認する。',m:'足場使用前点検',cls:'height'},{c:'足場',icon:'🏗️',r:'中',t:'足場上では材料を端部に置かず、落下防止措置をしてから作業する。',m:'足場上整理・落下防止',cls:'height'},{c:'重機',icon:'🚜',r:'高',t:'重機旋回範囲内は立入禁止とし、合図者を決めて運転者と合図方法を統一する。',m:'バックホウ・ラフター等',cls:'machine'},{c:'重機',icon:'🚜',r:'高',t:'吊荷の下には絶対に入らず、玉掛け完了後は安全な位置へ退避してから合図する。',m:'玉掛け・吊荷',cls:'machine'},{c:'重機',icon:'🚜',r:'中',t:'アウトリガー設置面の沈下・段差・敷鉄板の状態を確認し、設置後に再確認する。',m:'移動式クレーン',cls:'machine'},{c:'火気',icon:'🔥',r:'高',t:'火気作業前に可燃物を撤去し、消火器・火花養生・火気監視者を配置する。',m:'溶接・溶断・グラインダー',cls:'fire'},{c:'火気',icon:'🔥',r:'中',t:'火気作業後は残火確認を行い、周辺のくすぶり・焦げ・臭いを確認する。',m:'作業後確認',cls:'fire'},{c:'感電',icon:'⚡',r:'高',t:'電動工具・延長コードは使用前点検を行い、濡れた手・濡れた床での使用を避ける。',m:'電動工具・仮設電源',cls:'electric'},{c:'感電',icon:'⚡',r:'高',t:'盤内・活線近接作業は無断で行わず、停電確認・検電・表示を徹底する。',m:'盤内・活線近接',cls:'electric'},{c:'酸欠有害ガス',icon:'🧪',r:'高',t:'槽内・ピット・マンホール作業は酸素濃度と有害ガスを測定し、換気を行ってから入る。',m:'閉所・ピット・槽内',cls:'gas'},{c:'酸欠有害ガス',icon:'🧪',r:'高',t:'異臭・気分不良・警報発報時は作業を中止し、単独で救助に入らず責任者へ連絡する。',m:'緊急時対応',cls:'gas'},{c:'熱中症',icon:'🌞',r:'高',t:'暑熱作業ではこまめな水分・塩分補給を行い、体調不良者を一人にしない。',m:'夏場・屋外・高温部',cls:'health'},{c:'熱中症',icon:'🌞',r:'中',t:'休憩場所・飲料・冷却材を事前に確認し、無理な連続作業を避ける。',m:'休憩計画',cls:'health'},{c:'交通',icon:'🚧',r:'高',t:'車両通行部では誘導員を配置し、歩行者と車両の動線を分離する。',m:'場内交通・搬入出',cls:'traffic'},{c:'交通',icon:'🚧',r:'中',t:'バック走行時は死角を確認し、合図者の合図が見えない場合は停止する。',m:'後退・搬入車両',cls:'traffic'},{c:'飛来落下',icon:'🔩',r:'高',t:'上部作業と下部作業の同時作業を避け、工具・材料には落下防止措置を行う。',m:'上下作業・工具落下',cls:'danger'},{c:'飛来落下',icon:'🔩',r:'中',t:'切断・研磨作業では火花と切粉の飛散方向を確認し、防護メガネを着用する。',m:'グラインダー・切断',cls:'danger'},{c:'挟まれ巻込まれ',icon:'🧤',r:'高',t:'回転部・可動部・吊荷と固定物の間に手や体を入れず、合図後に作業する。',m:'回転工具・吊荷・搬入',cls:'danger'},{c:'挟まれ巻込まれ',icon:'🧤',r:'中',t:'重量物の仮置きは転倒・転がり防止を行い、手元の逃げ場を確保する。',m:'重量物・仮置き',cls:'danger'},{c:'品質安全',icon:'📋',r:'中',t:'作業手順と図面・寸法・仕様を確認し、不明点は自己判断せず職長へ確認する。',m:'手順・品質・手戻り防止',cls:'quality'},{c:'品質安全',icon:'📋',r:'中',t:'変更作業は口頭だけで進めず、指示者・内容・範囲を記録してから着手する。',m:'変更管理',cls:'quality'},{c:'片付け',icon:'🧹',r:'低',t:'作業終了時は工具・材料・端材を片付け、翌日のつまずき・転倒要因を残さない。',m:'終業時確認',cls:'clean'},{c:'片付け',icon:'🧹',r:'低',t:'ゴミ・ウエス・油類は分別し、火気や薬品の近くに放置しない。',m:'廃棄物・油類',cls:'clean'}];
const tabs=['全部',...new Set(ITEMS.map(x=>x.c))];let active='全部';let selected=[];const $=id=>document.getElementById(id);function riskScore(r){return r==='高'?3:r==='中'?2:1}function showToast(msg='コピーしました'){const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1300)}function renderTabs(){const el=$('tabs');el.innerHTML='';tabs.forEach(x=>{const b=document.createElement('button');b.className='tab'+(active===x?' active':'');b.textContent=x;b.onclick=()=>{active=x;renderTabs();renderCards()};el.appendChild(b)})}function filtered(){const q=$('q').value.trim().toLowerCase();const r=$('risk').value;let arr=ITEMS.filter(x=>(active==='全部'||x.c===active)&&(!r||x.r===r)&&(!q||(x.t+x.c+x.m).toLowerCase().includes(q)));if($('sort').value==='risk')arr=[...arr].sort((a,b)=>riskScore(b.r)-riskScore(a.r));if($('sort').value==='short')arr=[...arr].sort((a,b)=>a.t.length-b.t.length);return arr}function renderCards(){const list=filtered();$('count').textContent=`表示 ${list.length} 件 / 全 ${ITEMS.length} 件`;const el=$('cards');el.innerHTML='';list.forEach((x,i)=>{const card=document.createElement('article');card.className='card '+x.cls;card.innerHTML=`<div class="top"><span class="cat">${x.icon} ${escapeHtml(x.c)}</span><span class="risk">リスク${x.r}</span></div><div class="text">${escapeHtml(x.t)}</div><div class="meta">用途：${escapeHtml(x.m)}</div><div class="actions"><button class="btn ok" data-add="${i}">追加</button><button class="btn sub" data-copy="${i}">単体コピー</button></div>`;card.querySelector('[data-add]').onclick=()=>addItem(x);card.querySelector('[data-copy]').onclick=()=>copyText(x.t);el.appendChild(card)})}function renderSelected(){const el=$('selected');if(!selected.length){el.innerHTML='<div class="empty">カードの「追加」を押すと、ここに安全指示事項がまとまります。</div>'}else{el.innerHTML='';selected.forEach((t,i)=>{const d=document.createElement('div');d.className='sel';d.innerHTML=`${i+1}. ${escapeHtml(t)} <button class="btn sub" style="margin-top:8px;padding:7px 9px" data-del="${i}">削除</button>`;d.querySelector('[data-del]').onclick=()=>{selected.splice(i,1);renderSelected()};el.appendChild(d)})}const txt=selected.map((x,i)=>`${i+1}. ${x}`).join('\n');$('copybox').value=txt;localStorage.setItem('pichi_safety_selected',JSON.stringify(selected))}function addItem(x){if(!selected.includes(x.t))selected.push(x.t);renderSelected();showToast('追加しました')}function copyText(t){navigator.clipboard?.writeText(t).then(()=>showToast()).catch(()=>{const ta=$('copybox');ta.value=t;ta.select();document.execCommand('copy');showToast()})}function escapeHtml(s){return String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}$('q').oninput=renderCards;$('risk').onchange=renderCards;$('sort').onchange=renderCards;$('copyAll').onclick=()=>{const txt=$('copybox').value.trim();if(!txt)return showToast('まだ空です');copyText(txt)};$('clearAll').onclick=()=>{selected=[];renderSelected();showToast('クリアしました')};$('addCustom').onclick=()=>{const v=$('customText').value.trim();if(!v)return showToast('入力が空です');selected.push(v);$('customText').value='';renderSelected();showToast('追加しました')};try{selected=JSON.parse(localStorage.getItem('pichi_safety_selected')||'[]')}catch(e){selected=[]}renderTabs();renderCards();renderSelected();
</script>
</body>
</html>

<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>ぴち博士のアプリ工房</title>
<style>
:root{--ink:#302d42;--muted:#716b86;--line:rgba(88,75,128,.13);--shadow:0 22px 60px rgba(69,57,110,.16)}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:"Yu Gothic UI","Hiragino Sans",system-ui,sans-serif;color:var(--ink)}
body{min-height:100vh;padding:22px;background:radial-gradient(circle at 10% 10%,rgba(255,143,189,.28),transparent 28%),radial-gradient(circle at 90% 18%,rgba(99,210,255,.28),transparent 30%),linear-gradient(145deg,#fff5fb,#eef8ff)}
main{width:min(1080px,100%);margin:0 auto}header{text-align:center;padding:42px 16px 30px}.mark{display:inline-grid;place-items:center;width:70px;height:70px;border-radius:24px;background:linear-gradient(135deg,#ff91bf,#a99cff);box-shadow:0 16px 30px rgba(160,119,201,.25);font-size:36px}h1{margin:16px 0 8px;font-size:clamp(28px,6vw,46px);line-height:1.1}.lead{margin:0;color:var(--muted);font-weight:700}.apps{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:18px}.card{position:relative;display:flex;flex-direction:column;min-height:310px;padding:26px;border:1px solid rgba(255,255,255,.9);border-radius:30px;background:rgba(255,255,255,.82);box-shadow:var(--shadow);backdrop-filter:blur(18px);overflow:hidden}.card::after{content:"";position:absolute;width:180px;height:180px;border-radius:50%;right:-70px;bottom:-80px;opacity:.22}.gas::after{background:#54c7bc}.calc::after{background:#ff8fbd}.safety::after{background:#ffb247}.icon{font-size:48px;line-height:1}.tag{align-self:flex-start;margin:16px 0 10px;padding:7px 11px;border-radius:999px;font-size:12px;font-weight:900}.gas .tag{background:#dff8f3;color:#076c64}.calc .tag{background:#ffe1ee;color:#9b3f69}.safety .tag{background:#fff0c7;color:#8a5a00}h2{margin:0;font-size:25px}p{color:var(--muted);line-height:1.75}.open{position:relative;z-index:1;display:block;margin-top:auto;padding:14px 18px;border-radius:16px;color:#fff;text-align:center;text-decoration:none;font-weight:900;transition:.15s transform,.15s filter}.open:hover{transform:translateY(-2px);filter:brightness(1.04)}.gas .open{background:linear-gradient(135deg,#0a8278,#43bfae)}.calc .open{background:linear-gradient(135deg,#ff83b7,#a99cff)}.safety .open{background:linear-gradient(135deg,#ff9d40,#ff78a8)}footer{text-align:center;padding:28px 10px 8px;color:var(--muted);font-size:12px}@media(max-width:900px){.apps{grid-template-columns:1fr 1fr}}@media(max-width:640px){body{padding:12px}.apps{grid-template-columns:1fr}header{padding-top:28px}.card{min-height:270px}}
</style>
</head>
<body>
<main>
<header><div class="mark" aria-hidden="true">🧪</div><h1>ぴち博士のアプリ工房</h1><p class="lead">使いたいアプリを選んでください</p></header>
<section class="apps" aria-label="アプリ一覧">
<article class="card gas"><div class="icon" aria-hidden="true">🧯</div><span class="tag">現場計算</span><h2>窒素・ヘリウム瓶本数計算</h2><p>配管サイズ、SCH、長さ、試験圧力から、気密試験に必要なガス量とボンベ本数を計算します。</p><a class="open" href="./nitrogen_helium_cylinder_calculator.html">計算アプリを開く</a></article>
<article class="card calc"><div class="icon" aria-hidden="true">🧮</div><span class="tag">かわいい便利ツール</span><h2>ぴち博士のかわいい万能電卓</h2><p>基本計算から関数、メモリー、履歴まで使える、見た目もかわいい万能電卓です。</p><a class="open" href="./ぴち博士_かわいい万能電卓.html">万能電卓を開く</a></article>
<article class="card safety"><div class="icon" aria-hidden="true">🦺</div><span class="tag">安全・KY</span><h2>安全指示事項 参考リスト</h2><p>朝礼・KY・作業指示書に使いやすい安全指示事項を、検索・分類・コピーできる参考リストです。</p><a class="open" href="./ぴち博士_安全指示事項参考リスト.html">安全リストを開く</a></article>
</section>
<footer>ぴち博士研究室</footer>
</main>
</body>
</html>
